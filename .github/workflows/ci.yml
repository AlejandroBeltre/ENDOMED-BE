name: CI — Backend

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Ruff + Black
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install linters
        run: pip install ruff==0.9.10 black==25.1.0

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

  # ── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: lint

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-insecure-secret-key-not-used-in-production
      DATABASE_URL: ${{ secrets.DATABASE_URL_DEV }}
      REDIS_URL: redis://localhost:6379/1

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies
        run: |
          pip install -r requirements/base.txt
          pip install -r requirements/development.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=apps --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
